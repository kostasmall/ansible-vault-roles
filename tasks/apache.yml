---
   - name: Ensure Apache is installed.
     apt:
      name: apache2
      state: present

   - name: Copy test config file.
     copy:
      src: /tmp/test.conf
      dest: "{{ download_dir }}/test.conf"
      remote_src: yes
     notify: restart apache

   - name: Ensure Apache is running and starts at boot
     service:
      name: apache2
      state: started
      enabled: true
